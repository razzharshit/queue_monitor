name: Publish SDK

on:
  push:
    tags:
      - "sdk-v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - name: Verify release version
        run: test "sdk-v$(node -p \"require('./packages/sdk/package.json').version\")" = "$GITHUB_REF_NAME"
      - run: npm test
      - run: npm run build
      - run: npm run pack:check -w @queue-monitor/shared
      - run: npm run pack:check -w @queue-monitor/node
      - run: npm publish -w @queue-monitor/shared --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm publish -w @queue-monitor/node --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
